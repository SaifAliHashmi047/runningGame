apply plugin: "com.android.application"
apply plugin: "org.jetbrains.kotlin.android"
apply plugin: "com.facebook.react"
apply plugin: "com.google.gms.google-services"

/**
 * This is the configuration block to customize your React Native Android app.
 * By default you don't need to apply any configuration, just uncomment the lines you need.
 */
// Release signing — create android/keystore.properties (see keystore.properties.example); never commit secrets.
def keystorePropertiesFile = rootProject.file("keystore.properties")
def keystoreProperties = new Properties()
if (keystorePropertiesFile.exists()) {
    keystoreProperties.load(new FileInputStream(keystorePropertiesFile))
}

react {
    /* Folders */
    //   The root of your project, i.e. where "package.json" lives. Default is '../..'
    // root = file("../../")
    //   The folder where the react-native NPM package is. Default is ../../node_modules/react-native
    // reactNativeDir = file("../../node_modules/react-native")
    //   The folder where the react-native Codegen package is. Default is ../../node_modules/@react-native/codegen
    // codegenDir = file("../../node_modules/@react-native/codegen")
    //   The cli.js file which is the React Native CLI entrypoint. Default is ../../node_modules/react-native/cli.js
    // cliFile = file("../../node_modules/react-native/cli.js")

    /* Variants */
    //   The list of variants to that are debuggable. For those we're going to
    //   skip the bundling of the JS bundle and the assets. Default is "debug", "debugOptimized".
    //   If you add flavors like lite, prod, etc. you'll have to list your debuggableVariants.
    // debuggableVariants = ["liteDebug", "liteDebugOptimized", "prodDebug", "prodDebugOptimized"]

    /* Bundling */
    //   A list containing the node command and its flags. Default is just 'node'.
    // nodeExecutableAndArgs = ["node"]
    //
    //   The command to run when bundling. By default is 'bundle'
    // bundleCommand = "ram-bundle"
    //
    //   The path to the CLI configuration file. Default is empty.
    // bundleConfig = file(../rn-cli.config.js)
    //
    //   The name of the generated asset file containing your JS bundle
    // bundleAssetName = "MyApplication.android.bundle"
    //
    //   The entry file for bundle generation. Default is 'index.android.js' or 'index.js'
    // entryFile = file("../js/MyApplication.android.js")
    //
    //   A list of extra flags to pass to the 'bundle' commands.
    //   See https://github.com/react-native-community/cli/blob/main/docs/commands.md#bundle
    // extraPackagerArgs = []

    /* Hermes Commands */
    //   The hermes compiler command to run. By default it is 'hermesc'
    // hermesCommand = "$rootDir/my-custom-hermesc/bin/hermesc"
    //
    //   The list of flags to pass to the Hermes compiler. By default is "-O", "-output-source-map"
    // hermesFlags = ["-O", "-output-source-map"]

    /* Autolinking */
    autolinkLibrariesWithApp()

    /* Hermes: keep -O; drop -output-source-map for slightly leaner release pipeline (maps not in APK). */
    hermesFlags = ["-O"]
}

/**
 * The preferred build flavor of JavaScriptCore (JSC)
 *
 * For example, to use the international variant, you can use:
 * `def jscFlavor = io.github.react-native-community:jsc-android-intl:2026004.+`
 *
 * The international variant includes ICU i18n library and necessary data
 * allowing to use e.g. `Date.toLocaleString` and `String.localeCompare` that
 * give correct results when using with locales other than en-US. Note that
 * this variant is about 6MiB larger per architecture than default.
 */
def jscFlavor = 'io.github.react-native-community:jsc-android:2026004.+'

android {
    ndkVersion rootProject.ext.ndkVersion
    buildToolsVersion rootProject.ext.buildToolsVersion
    compileSdk rootProject.ext.compileSdkVersion

    namespace "arcadegame.running.topgame.galaxyrunner"
    defaultConfig {
        applicationId "arcadegame.running.topgame.galaxyrunner"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode 2
        versionName "1.1"
    }
    signingConfigs {
        debug {
            storeFile file('debug.keystore')
            storePassword 'android'
            keyAlias 'androiddebugkey'
            keyPassword 'android'
        }
        release {
            if (!keystorePropertiesFile.exists()) {
                throw new GradleException("Missing android/keystore.properties. Release builds must be signed with the upload keystore.")
            }
            storeFile rootProject.file(keystoreProperties['storeFile'])
            storePassword keystoreProperties['storePassword']
            keyAlias keystoreProperties['keyAlias']
            keyPassword keystoreProperties['keyPassword']
        }
    }
    buildTypes {
        debug {
            signingConfig signingConfigs.debug
            minifyEnabled false
            shrinkResources false
        }
        release {
            signingConfig signingConfigs.release
            minifyEnabled true
            shrinkResources true
            /* R8 in full mode (gradle.properties) + optimize proguard file. */
            proguardFiles getDefaultProguardFile("proguard-android-optimize.txt"), "proguard-rules.pro"
        }
    }
}

dependencies {
    // The version of react-native is set by the React Native Gradle Plugin
    implementation("com.facebook.react:react-android")
    implementation(platform("com.google.firebase:firebase-bom:34.12.0"))
    implementation("com.google.firebase:firebase-messaging")

    if (hermesEnabled.toBoolean()) {
        implementation("com.facebook.react:hermes-android")
    } else {
        implementation jscFlavor
    }
}

// New Architecture: app CMake autolinking expects each library's JNI codegen dir to exist.
// If configureCMake runs before a library's generateCodegenArtifactsFromSchema, CMake fails
// (e.g. react-native-sound .../build/generated/source/codegen/jni missing).
afterEvaluate {
    // Some RN libraries don't actually generate codegen JNI output, but the autolinking CMake
    // script still expects the directory to exist. Create the folders up front to avoid
    // intermittent configureCMake failures.
    def ensureAutolinkingCodegenJniDirs = tasks.register("ensureAutolinkingCodegenJniDirs") {
        doLast {
            // RN's default-app-setup sometimes defines REACT_NATIVE_APP_CODEGEN_HEADER=".h" when the app has no
            // codegen output. Providing an empty ".h" in the generated autolinking include dir keeps native
            // builds stable.
            def autolinkingJniDir = new File(project.buildDir, "generated/autolinking/src/main/jni")
            if (autolinkingJniDir.exists()) {
                // 1) Stub app-local codegen header (included via REACT_NATIVE_APP_CODEGEN_HEADER)
                def dotH = new File(autolinkingJniDir, ".h")
                dotH.write(
                    "#pragma once\n" +
                    "#include <memory>\n" +
                    "#include <string>\n" +
                    "#include <ReactCommon/JavaTurboModule.h>\n" +
                    "#include <ReactCommon/TurboModule.h>\n" +
                    "#include <react/renderer/componentregistry/ComponentDescriptorProviderRegistry.h>\n" +
                    "\n" +
                    "namespace facebook::react {\n" +
                    "inline std::shared_ptr<TurboModule> _ModuleProvider(\n" +
                    "    const std::string&, const JavaTurboModule::InitParams&) {\n" +
                    "  return nullptr;\n" +
                    "}\n" +
                    "inline void _registerComponentDescriptorsFromCodegen(\n" +
                    "    std::shared_ptr<const ComponentDescriptorProviderRegistry>) {}\n" +
                    "} // namespace facebook::react\n"
                )

                // 2) Stub header that some libraries (e.g. react-native-sound) may be referenced from autolinking.cpp
                def rnSoundSpec = new File(autolinkingJniDir, "RNSoundSpec.h")
                rnSoundSpec.write(
                    "#pragma once\n" +
                    "#include <memory>\n" +
                    "#include <string>\n" +
                    "#include <ReactCommon/JavaTurboModule.h>\n" +
                    "#include <ReactCommon/TurboModule.h>\n" +
                    "\n" +
                    "namespace facebook::react {\n" +
                    "inline std::shared_ptr<TurboModule> RNSoundSpec_ModuleProvider(\n" +
                    "    const std::string&, const JavaTurboModule::InitParams&) {\n" +
                    "  return nullptr;\n" +
                    "}\n" +
                    "} // namespace facebook::react\n"
                )

                // 3) Stub app component descriptor header (when none exists, macro can point to a bogus path)
                def appDescriptors = new File(autolinkingJniDir, "react/renderer/components/ComponentDescriptors.h")
                if (!appDescriptors.exists()) {
                    appDescriptors.parentFile.mkdirs()
                    appDescriptors.write("#pragma once\n")
                }
            }

            rootProject.subprojects.each { sub ->
                def dir = new File(sub.projectDir, "build/generated/source/codegen/jni")
                if (!dir.exists()) dir.mkdirs()

                // Autolinking uses add_subdirectory(...) so the folder must contain a CMakeLists.txt.
                def cmakeLists = new File(dir, "CMakeLists.txt")
                // Most libraries that land here generate their own CMake targets. Some (e.g. react-native-sound)
                // are listed by autolinking as codegen targets but don't actually generate JNI build files.
                // Provide an empty INTERFACE target so CMake configure doesn't fail.
                if (sub.name == "react-native-sound") {
                    def dummy = new File(dir, "dummy.c")
                    dummy.write("void rn_sound_codegen_stub(void) {}\n")
                    cmakeLists.write(
                        "cmake_minimum_required(VERSION 3.13)\n" +
                        "add_library(react_codegen_RNSoundSpec STATIC dummy.c)\n"
                    )
                } else if (!cmakeLists.exists()) {
                    cmakeLists.write("")
                }
            }
        }
    }

    // `:app:externalNativeBuildClean*` can run after `<lib>:clean` tasks which delete the stubbed
    // codegen JNI folders we create. Make sure our ensure task always runs after all project clean tasks.
    def allCleanTasks = []
    rootProject.subprojects.each { sub ->
        if (sub == project) return
        def cleanTask = sub.tasks.findByName("clean")
        if (cleanTask != null) allCleanTasks.add(cleanTask)
    }
    ensureAutolinkingCodegenJniDirs.configure { t ->
        if (!allCleanTasks.isEmpty()) {
            t.mustRunAfter(allCleanTasks)
        }
    }

    tasks.configureEach { task ->
        if (task.project != project) return

        // Keep New Architecture autolinking stable across both configure and clean phases.
        if (task.name.startsWith("configureCMake") || task.name.startsWith("externalNativeBuild")) {
            task.dependsOn(ensureAutolinkingCodegenJniDirs)

            rootProject.subprojects.each { sub ->
                def codegen = sub.tasks.findByName("generateCodegenArtifactsFromSchema")
                if (codegen != null) {
                    task.dependsOn(codegen)
                }
            }
        }
    }
}
